[tools]
zig = "0.15.2"
uv = "0.11.6"
tinytex = "2026.04"

[tasks]
build = { run = "zig build workloads gem5" }
# TinyTeX is a minimal TeX Live; install the bits Matplotlib's `usetex` needs.
# SciencePlots' `ieee` style pulls in Times/Palatino-related packages which in
# turn require `type1cm` (scalable Computer Modern) and often `cm-super`.
setup-tex = { run = ["tlmgr install dvipng type1cm cm-super underscore ieeetran embedfile interfaces", "mktexlsr"] }
simulate = { run = "zig build simulations" }
report = { depends = ["setup-tex"], run = "zig build report" }
